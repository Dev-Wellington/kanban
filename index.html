<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Kanban</title>
  </head>
  <body>
    <header>
      <h1>Gestão Técnica</h1>
    </header>
    <main class="container">
      <section class="board">
        <div class="kanban-column">
          <h2>Fila</h2>
          <ul class="cards" id="fila"></ul>
        </div>
        <div class="kanban-column">
          <h2>Bancada</h2>
          <ul class="cards" id="bancada"></ul>
        </div>
        <div class="kanban-column">
          <h2>Aguardando peça</h2>
          <ul class="cards" id="aguardando-peca"></ul>
        </div>
        <div class="kanban-column">
          <h2>Concluído</h2>
          <ul class="cards" id="concluido"></ul>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
