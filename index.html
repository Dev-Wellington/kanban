<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Kanban</title>
  </head>
  <body>
    <header>
      <h1>Gestão Técnica</h1>
    </header>
    <main class="container">
      <section class="board">
        <div class="kanban-column">
          <h2>Fila</h2>
          <ul class="cards">
            <li class="card">
              <div class="card-header">
                <p class="card-status">A fazer</p>
                <h3 class="card-title">Tarefa 1</h3>
              </div>
              <p class="card-description">Descrição da tarefa 1</p>
              <div class="card-footer">
                <div class="card-info">
                  <img class="card-icon" src="" alt="" />
                  <p class="date card-date"></p>
                </div>
                <p class="card-priority">Prioridade: Média</p>
              </div>
            </li>
          </ul>
        </div>
        <div class="kanban-column">
          <h2>Bancada</h2>
          <ul class="cards"></ul>
        </div>
        <div class="kanban-column">
          <h2>Aguardando peça</h2>
          <ul class="cards"></ul>
        </div>
        <div class="kanban-column">
          <h2>Concluído</h2>
          <ul class="cards"></ul>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
