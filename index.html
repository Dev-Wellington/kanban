<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Kanban</title>
  </head>
  <body>
    <header>
      <h1>Gestão Técnica</h1>
    </header>
    <dialog id="modal">
      <form id="form-os" >
        <header class="modal-header">
          <h2>Adicionar Nova Ordem de Serviço</h2>
          <button type="button" class="btn-close" aria-label="Fechar modal">
            <img src="icons/close.svg" alt="">
          </button>
        </header>
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" required />
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" required></textarea>
        <label for="prioridade">Prioridade:</label>
        <select id="prioridade" name="prioridade" required>
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>
        <button type="submit" id="btn-adicionar">Adicionar</button>
      </form>
    </dialog>
    <main class="container">
      <section class="board">
        <section class="kanban-column">
          <div class="column-header">
            <h2>Fila</h2>
            <button
              class="btn-add"
              data-coluna="fila"
              aria-label="Adicionar na Fila"
            >
              <img src="icons/add.svg" alt="Botão adicionar" />
            </button>
          </div>
          <ul class="cards" id="fila"></ul>
        </section>
        <section class="kanban-column">
          <div class="column-header">
            <h2>Bancada</h2>
            <button
              class="btn-add"
              data-coluna="bancada"
              aria-label="Adicionar na Bancada"
            >
              <img src="icons/add.svg" alt="Botão adicionar" />
            </button>
          </div>
          <ul class="cards" id="bancada"></ul>
        </section>
        <section class="kanban-column">
          <div class="column-header">
            <h2>Aguardando peça</h2>
            <button
              class="btn-add"
              data-coluna="aguardando-peca"
              aria-label="Adicionar em Aguardando peça"
            >
              <img src="icons/add.svg" alt="Botão adicionar" />
            </button>
          </div>
          <ul class="cards" id="aguardando-peca"></ul>
        </section>
        <section class="kanban-column">
          <div class="column-header">
            <h2>Concluído</h2>
            <button
              class="btn-add"
              data-coluna="concluido"
              aria-label="Adicionar em Concluído"
            >
              <img src="icons/add.svg" alt="Botão adicionar" />
            </button>
          </div>
          <ul class="cards" id="concluido"></ul>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
